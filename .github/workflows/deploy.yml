name: Deploy Diamond Physique to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Verify npm registry
        run: npm ping

      - name: Install client dependencies
        working-directory: client
        run: npm ci --workspaces=false --no-audit --no-fund --loglevel=verbose
        env:
          npm_config_fetch_retries: 2
          npm_config_fetch_timeout: 60000
          npm_config_fetch_retry_maxtimeout: 20000

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Add React Router fallback
        run: cp client/dist/index.html client/dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: client/dist

  deploy:
    name: Deploy website
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5